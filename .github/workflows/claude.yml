name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: "Claude에게 시킬 작업"
        required: true
        type: string
  push:
    branches: [main]
    paths:
      - 'README.md'

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write

concurrency:
  group: claude-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'push' &&
        github.actor != 'claude[bot]' &&
        !contains(github.event.head_commit.message, '[skip-claude]')
      ) ||
      (
        contains(github.event.comment.body, '@claude') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: [self-hosted, linux, x64, claude-local]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@claude"
          use_commit_signing: true
          prompt: ${{ inputs.prompt || 'README.md를 검토하고, 의미있는 보강이 있으면 한 줄 추가하여 commit해줘. 다른 파일은 건드리지 마. commit message 끝에 [skip-claude] 마커를 포함해서 무한루프를 막아줘.' }}
          claude_args: |
            --max-turns 10
            --allowedTools "Bash(uv sync),Bash(uv run ruff check --fix .),Bash(uv run ruff format .),Bash(uv run pyright),Bash(uv run pytest),Bash(git status),Bash(git diff)"
