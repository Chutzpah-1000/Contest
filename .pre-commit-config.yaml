# .pre-commit-config.yaml
# 정책: 커밋 전 자동 실행. 실패 시 커밋 차단.
# 설치: uv tool install pre-commit && pre-commit install
# 수동 실행: pre-commit run --all-files

minimum_pre_commit_version: "3.7.0"
default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
fail_fast: false

repos:
  # ───── 일반 hygiene ─────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe] # for !ENV style tags
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-ast # python 파싱 가능 여부
      - id: check-case-conflict
      - id: check-docstring-first
      - id: debug-statements # pdb·breakpoint 차단
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: name-tests-test
        args: [--pytest-test-first]

  # ───── Ruff (linter + formatter) ─────
  # 정본 버전 핀: pyproject.toml dev deps 와 일치 유지
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        name: ruff (lint+autofix)
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff (format)

  # ───── Pyright (strict type check) ─────
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.385
    hooks:
      - id: pyright
        # pyproject.toml 의 [tool.pyright] 설정을 자동 사용

  # ───── 보안: secret 감지 ─────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # ───── uv lock 동기화 (requirements 변경 시) ─────
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.4.27
    hooks:
      - id: uv-lock

  # ───── Markdown 검사 ─────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint-fix
        args: [--config, .markdownlint.json]
        files: ^(docs/|AGENTS\.md|README\.md|CLAUDE\.md)
